<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Фон -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Декоративні розмиті колір-блоби -->
  <circle cx="160" cy="120" r="90" fill="#f0abfc" opacity="0.45" filter="url(#soft)"/>
  <circle cx="1050" cy="500" r="120" fill="#67e8f9" opacity="0.35" filter="url(#soft)"/>

  <!-- Логотип-плашка -->
  <g transform="translate(80, 80)">
    <rect width="100" height="100" rx="24" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <text x="50" y="62" text-anchor="middle"
          font-family="Nunito, system-ui, sans-serif" font-weight="900"
          font-size="60" fill="white">🧠</text>
  </g>
  <text x="210" y="148" font-family="Nunito, system-ui, sans-serif" font-weight="900"
        font-size="56" fill="white">MathQuest</text>

  <!-- Головний заголовок -->
  <text x="80" y="320" font-family="Nunito, system-ui, sans-serif" font-weight="900"
        font-size="84" fill="white" letter-spacing="-3">
    Математика,
  </text>
  <text x="80" y="412" font-family="Nunito, system-ui, sans-serif" font-weight="900"
        font-size="84" fill="white" letter-spacing="-3">
    від якої не нудно
  </text>

  <!-- Підпис -->
  <text x="80" y="478" font-family="Nunito, system-ui, sans-serif" font-weight="700"
        font-size="32" fill="rgba(255,255,255,0.9)" letter-spacing="-0.5">
    Тренажер для 4–5 класу · НУШ · Українською
  </text>

  <!-- Бейджі -->
  <g transform="translate(80, 530)">
    <g>
      <rect width="200" height="48" rx="24" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <text x="100" y="31" text-anchor="middle" font-family="Nunito" font-weight="800" font-size="20" fill="white">Без реклами</text>
    </g>
    <g transform="translate(216, 0)">
      <rect width="200" height="48" rx="24" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <text x="100" y="31" text-anchor="middle" font-family="Nunito" font-weight="800" font-size="20" fill="white">Працює офлайн</text>
    </g>
    <g transform="translate(432, 0)">
      <rect width="220" height="48" rx="24" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <text x="110" y="31" text-anchor="middle" font-family="Nunito" font-weight="800" font-size="20" fill="white">10 тем · 50+ задач</text>
    </g>
  </g>

  <!-- Декоративний приклад -->
  <g transform="translate(820, 220)">
    <rect x="-20" y="-50" width="320" height="220" rx="32" fill="rgba(255,255,255,0.95)"/>
    <text x="140" y="0" text-anchor="middle" font-family="Nunito" font-weight="700" font-size="22" fill="#64748b">Прості рівняння</text>
    <text x="140" y="80" text-anchor="middle" font-family="Nunito" font-weight="900" font-size="64" fill="#0f172a">x + 47 = 113</text>
    <rect x="40" y="110" width="200" height="50" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="140" y="146" text-anchor="middle" font-family="Nunito" font-weight="900" font-size="32" fill="#047857">66 ✓</text>
  </g>
</svg>
